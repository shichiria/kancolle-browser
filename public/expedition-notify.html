<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.notify-container {
  background: rgba(10, 25, 47, 0.92);
  border: 1px solid rgba(79, 195, 247, 0.4);
  border-radius: 6px;
  padding: 6px 10px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
  animation: notify-fade-in 0.3s ease-out;
}
@keyframes notify-fade-in {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
.notify-title {
  font-size: 11px;
  color: #4fc3f7;
  font-weight: bold;
  margin-bottom: 3px;
}
.notify-item {
  font-size: 12px;
  color: #e0e0e0;
  padding: 1px 0;
  white-space: nowrap;
}
.notify-fleet {
  color: #ffb74d;
  font-weight: bold;
}
</style>
</head>
<body>
<div id="notify-root"></div>
<script>
window.showNotifications = function(items) {
  var root = document.getElementById('notify-root');
  var html = '<div class="notify-container">';
  html += '<div class="notify-title">\u904D\u5F81\u5E30\u9084\u53EF\u80FD</div>';
  for (var i = 0; i < items.length; i++) {
    html += '<div class="notify-item"><span class="notify-fleet">[' + items[i].fleet_id + ']</span> ' + items[i].mission_name + '</div>';
  }
  html += '</div>';
  root.innerHTML = html;
};

window.hideNotifications = function() {
  document.getElementById('notify-root').innerHTML = '';
};
</script>
</body>
</html>
