<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
}
.frame {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  border: 2px solid #00e5ff;
  border-radius: 4px;
  box-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
}
</style>
</head>
<body>
<div class="frame"></div>
</body>
</html>
